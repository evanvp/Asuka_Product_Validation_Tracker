<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>驗證進度追蹤</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; display: flex; height: 100vh; background: #f0f2f5; color: #333; overflow: hidden; }
 
/* ── Sidebar ── */
#sidebar {
  width: 240px; flex-shrink: 0;
  background: #1e293b; color: white;
  display: flex; flex-direction: column;
}
#sidebarHeader {
  padding: 18px 20px 14px;
  border-bottom: 1px solid #334155;
}
#sidebarHeader h2 { font-size: 13px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
#productList { flex: 1; overflow-y: auto; padding: 6px 0; }
.product-item {
  padding: 11px 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  transition: background 0.15s; gap: 8px;
}
.product-item:hover { background: #334155; }
.product-item.active { background: #2563eb; }
.product-name { font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.del-product {
  background: none; border: none; color: #94a3b8; cursor: pointer;
  opacity: 0; font-size: 14px; padding: 2px 4px; line-height: 1; border-radius: 4px;
  transition: opacity 0.15s;
}
.product-item:hover .del-product { opacity: 1; }
.del-product:hover { color: #f87171; background: rgba(248,113,113,0.15); }
#addProductBtn {
  margin: 12px; padding: 10px 14px;
  background: #2563eb; border: none; border-radius: 8px;
  color: white; cursor: pointer; font-size: 14px; font-weight: 500;
  transition: background 0.15s;
}
#addProductBtn:hover { background: #1d4ed8; }
 
/* ── Main ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#productHeader {
  background: white; padding: 16px 28px;
  border-bottom: 1px solid #e2e8f0;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
#productHeader h1 { font-size: 20px; font-weight: 600; }
.header-right { display: flex; align-items: center; gap: 10px; }
.completion-badge {
  font-size: 13px; color: #64748b;
  background: #f1f5f9; padding: 5px 12px; border-radius: 20px;
}
.completion-badge.overdue { background: #fee2e2; color: #991b1b; }
.btn-edit {
  padding: 6px 14px; background: #f1f5f9; border: 1px solid #e2e8f0;
  border-radius: 6px; cursor: pointer; font-size: 13px; color: #374151;
  transition: all 0.15s;
}
.btn-edit:hover { background: #e2e8f0; }
 
#content { flex: 1; overflow-y: auto; padding: 24px 28px; }
#placeholder {
  display: flex; align-items: center; justify-content: center;
  height: 100%; color: #94a3b8; font-size: 17px; gap: 10px;
}
 
/* ── Section ── */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.section-title { font-size: 15px; font-weight: 600; color: #1e293b; }
.btn-primary {
  padding: 8px 16px; background: #2563eb; color: white;
  border: none; border-radius: 7px; cursor: pointer; font-size: 14px; font-weight: 500;
  transition: background 0.15s;
}
.btn-primary:hover { background: #1d4ed8; }
 
/* ── Table ── */
.table-wrap { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
table { width: 100%; border-collapse: collapse; }
thead tr { background: #f8fafc; }
th {
  padding: 11px 14px; text-align: left;
  font-size: 11px; font-weight: 600; color: #64748b;
  text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 1px solid #e2e8f0; white-space: nowrap;
}
td {
  padding: 11px 14px; border-bottom: 1px solid #f1f5f9;
  font-size: 13px; vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #f8fafc; }
.truncate { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
 
.score-badge {
  display: inline-block; padding: 3px 10px; border-radius: 12px;
  font-size: 12px; font-weight: 600; white-space: nowrap;
}
.score-high  { background: #dcfce7; color: #166534; }
.score-mid   { background: #fef9c3; color: #854d0e; }
.score-low   { background: #fee2e2; color: #991b1b; }
.score-na    { background: #f1f5f9; color: #64748b; }
 
.action-btn {
  padding: 4px 9px; border: 1px solid #e2e8f0; border-radius: 5px;
  background: white; cursor: pointer; font-size: 12px; margin-right: 3px;
  transition: all 0.15s; color: #374151;
}
.action-btn:hover { background: #f1f5f9; }
.action-btn.danger { color: #ef4444; border-color: #fecaca; }
.action-btn.danger:hover { background: #fee2e2; }
 
/* ── Gantt ── */
#ganttSection { margin-top: 28px; }
#ganttWrap {
  background: white; border-radius: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  padding: 16px; overflow-x: auto;
}
#ganttCanvas { display: block; }
 
/* ── Modal overlay ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(15,23,42,0.55); z-index: 200;
  align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: white; border-radius: 14px;
  width: 740px; max-width: 95vw; max-height: 90vh;
  overflow-y: auto; padding: 28px 30px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.28);
  position: relative;
}
.modal-sm { width: 440px; }
.modal h2 { font-size: 18px; font-weight: 600; margin-bottom: 22px; padding-right: 30px; }
.modal-close {
  position: absolute; top: 20px; right: 22px;
  background: none; border: none; font-size: 22px;
  cursor: pointer; color: #94a3b8; line-height: 1; border-radius: 4px; padding: 2px 6px;
}
.modal-close:hover { background: #f1f5f9; color: #374151; }
 
/* ── Form ── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1 / -1; }
label { font-size: 13px; font-weight: 500; color: #374151; }
input[type=text], input[type=date], textarea, select {
  padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 7px;
  font-size: 14px; outline: none; transition: border-color 0.15s; font-family: inherit;
  color: #1e293b;
}
input:focus, textarea:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
textarea { resize: vertical; min-height: 76px; }
 
/* ── Rating ── */
.rating-section {
  border: 1px solid #e2e8f0; border-radius: 9px;
  overflow: hidden; margin-bottom: 20px;
}
.rating-header {
  background: #f8fafc; padding: 10px 16px;
  font-size: 13px; font-weight: 600; color: #374151;
  border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between;
}
.rating-legend { display: flex; gap: 14px; font-weight: 400; }
.rating-legend span { font-size: 12px; color: #64748b; display: flex; align-items: center; gap: 4px; }
.rating-row {
  display: flex; align-items: center; padding: 9px 16px;
  border-bottom: 1px solid #f1f5f9; gap: 10px;
}
.rating-row:last-child { border-bottom: none; }
.rating-row.is-sub { padding-left: 36px; background: #fafafa; }
.rating-row.group-label {
  padding: 8px 16px 4px; background: #f8fafc;
  border-bottom: 1px solid #e2e8f0; font-size: 12px;
  font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 0.4px;
}
.rating-label { flex: 1; font-size: 14px; color: #374151; }
.rating-btns { display: flex; gap: 5px; }
.rating-btn {
  width: 34px; height: 34px; border-radius: 7px;
  border: 2px solid #e2e8f0; background: white;
  cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; color: #94a3b8;
}
.rating-btn:hover { border-color: #94a3b8; color: #374151; }
.rating-btn.pass.active  { background: #dcfce7; border-color: #16a34a; color: #16a34a; }
.rating-btn.partial.active { background: #fef9c3; border-color: #ca8a04; color: #ca8a04; }
.rating-btn.fail.active  { background: #fee2e2; border-color: #dc2626; color: #dc2626; }
 
/* ── Drive link ── */
.drive-link-preview {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 8px; font-size: 13px;
}
.drive-link-preview a { color: #2563eb; text-decoration: none; }
.drive-link-preview a:hover { text-decoration: underline; }
 
/* ── Modal actions ── */
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
.btn-secondary {
  padding: 8px 20px; background: white; border: 1px solid #d1d5db;
  border-radius: 7px; cursor: pointer; font-size: 14px; color: #374151;
  transition: background 0.15s;
}
.btn-secondary:hover { background: #f8fafc; }
 
/* ── View modal ── */
.view-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.view-field label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; display: block; margin-bottom: 5px; }
.view-field p { font-size: 14px; line-height: 1.6; color: #1e293b; }
.view-field.full { grid-column: 1 / -1; }
.view-divider { border: none; border-top: 1px solid #e2e8f0; margin: 16px 0; }
.view-rating-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px;
}
.view-rating-row:last-child { border-bottom: none; }
.view-rating-row.is-sub { padding-left: 18px; color: #475569; }
.view-rating-row.group-label { font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.4px; padding-top: 12px; border-bottom: none; }
.rating-icon { font-size: 16px; font-weight: 600; }
.rating-icon.pass    { color: #16a34a; }
.rating-icon.partial { color: #ca8a04; }
.rating-icon.fail    { color: #dc2626; }
.rating-icon.none    { color: #cbd5e1; }
</style>
</head>
<body>
 
<!-- ═══ SIDEBAR ═══ -->
<div id="sidebar">
  <div id="sidebarHeader"><h2>產品列表</h2></div>
  <div id="productList"></div>
  <button id="addProductBtn">＋ 新增產品</button>
</div>
 
<!-- ═══ MAIN ═══ -->
<div id="main">
  <div id="productHeader" style="display:none">
    <h1 id="productNameDisplay"></h1>
    <div class="header-right">
      <span class="completion-badge" id="completionBadge"></span>
      <button class="btn-edit" onclick="openEditProductModal()">✏️ 編輯</button>
    </div>
  </div>
 
  <div id="content">
    <div id="placeholder">← 請選擇或新增產品</div>
 
    <div id="productContent" style="display:none">
      <div class="section-header">
        <span class="section-title">測試記錄</span>
        <button class="btn-primary" id="addRowBtn">＋ 新增測試</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>日期</th>
              <th>軟體版本</th>
              <th>敘述</th>
              <th>解決方案</th>
              <th>綜合評分</th>
              <th>附件</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="rowTableBody"></tbody>
        </table>
      </div>
 
      <div id="ganttSection" style="display:none">
        <div class="section-header" style="margin-top:28px; margin-bottom:14px">
          <span class="section-title">進度甘特圖</span>
          <div style="font-size:12px;color:#94a3b8;display:flex;gap:14px">
            <span>🟢 通過 &nbsp;🟡 部分 &nbsp;🔴 未通過</span>
            <span>┆ 橘線 = 預計完成日</span>
          </div>
        </div>
        <div id="ganttWrap"><canvas id="ganttCanvas"></canvas></div>
      </div>
    </div>
  </div>
</div>
 
<!-- ═══ PRODUCT MODAL ═══ -->
<div class="modal-overlay" id="productModal">
  <div class="modal modal-sm">
    <button class="modal-close" onclick="closeModal('productModal')">×</button>
    <h2 id="productModalTitle">新增產品</h2>
    <div class="form-group" style="margin-bottom:16px">
      <label>產品名稱</label>
      <input type="text" id="productNameInput" placeholder="例：Model X v2.0">
    </div>
    <div class="form-group" style="margin-bottom:4px">
      <label>預計完成日期</label>
      <input type="date" id="productDateInput">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('productModal')">取消</button>
      <button class="btn-primary" onclick="saveProduct()">儲存</button>
    </div>
  </div>
</div>
 
<!-- ═══ ROW MODAL ═══ -->
<div class="modal-overlay" id="rowModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('rowModal')">×</button>
    <h2 id="rowModalTitle">新增測試記錄</h2>
 
    <div class="form-grid">
      <div class="form-group">
        <label>測試日期 *</label>
        <input type="date" id="rowDate">
      </div>
      <div class="form-group">
        <label>軟體版本</label>
        <input type="text" id="rowVersion" placeholder="v1.0.0">
      </div>
      <div class="form-group full">
        <label>測試敘述</label>
        <textarea id="rowDesc" placeholder="說明本次測試內容..."></textarea>
      </div>
      <div class="form-group full">
        <label>解決方案</label>
        <textarea id="rowSolution" placeholder="記錄問題解決方式..."></textarea>
      </div>
    </div>
 
    <!-- Rating grid -->
    <div class="rating-section">
      <div class="rating-header">
        <span>測試評分</span>
        <div class="rating-legend">
          <span>✓ 通過</span>
          <span>△ 部分通過</span>
          <span>✗ 未通過</span>
        </div>
      </div>
      <div id="ratingRows"></div>
    </div>
 
    <!-- File upload -->
    <div class="form-group" style="margin-bottom:20px">
      <label>Google Drive 連結</label>
      <input type="text" id="driveLink" placeholder="貼上 Google Drive 分享連結...">
    </div>
 
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('rowModal')">取消</button>
      <button class="btn-primary" id="saveRowBtn" onclick="saveRow()">儲存</button>
    </div>
  </div>
</div>
 
<!-- ═══ VIEW MODAL ═══ -->
<div class="modal-overlay" id="viewModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('viewModal')">×</button>
    <h2>測試記錄詳情</h2>
    <div id="viewContent"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('viewModal')">關閉</button>
    </div>
  </div>
</div>
 
 
<script>
// ══════════════════════════════════════════════
//  FIREBASE CONFIG — 填入你的 Firebase 設定
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyCYPKCmSkez85KxKioI82cD1rkQQmH5FnM",
  authDomain: "asuka-product-validation.firebaseapp.com",
  projectId: "asuka-product-validation",
  storageBucket: "asuka-product-validation.firebasestorage.app",
  messagingSenderId: "960325564237",
  appId: "1:960325564237:web:c9e79b8cac8db6ff376904",
  measurementId: "G-CMKWEHVKW6"
};
 
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
 
// ══════════════════════════════════════════════
//  TEST CATEGORIES
// ══════════════════════════════════════════════
const CATS = [
  { key: 'electrical', label: '電氣測試',    group: null },
  { key: 'factory',    label: '工廠測試模式', group: null },
  { key: 'func_bt',    label: '藍芽功能',    group: 'functional', groupLabel: '功能測試' },
  { key: 'func_wifi',  label: 'WiFi',        group: 'functional', groupLabel: '功能測試' },
  { key: 'func_apps',  label: 'Apps',        group: 'functional', groupLabel: '功能測試' },
  { key: 'func_audio', label: '音場',        group: 'functional', groupLabel: '功能測試' },
  { key: 'func_rev',   label: '倒車',        group: 'functional', groupLabel: '功能測試' },
  { key: 'func_nav',   label: '導航',        group: 'functional', groupLabel: '功能測試' },
  { key: 'restart',    label: '重啟測試',    group: null },
  { key: 'stress',     label: '壓力測試',    group: null },
  { key: 'other',      label: '其他',        group: null },
];
 
// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let currentProductId   = null;
let currentProductData = null;
let editingProductId   = null;
let editingRowId       = null;
let currentRatings = {};
let unsubRows      = null;
let cachedRows         = [];
 
// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
document.getElementById('addProductBtn').onclick = openAddProductModal;
document.getElementById('addRowBtn').onclick     = openAddRowModal;
 
// Close on overlay click
['productModal','rowModal','viewModal'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    if (e.target.id === id) closeModal(id);
  });
});
 
 
buildRatingUI();
loadProducts();
 
window.addEventListener('resize', () => {
  if (cachedRows.length) renderGantt(cachedRows, currentProductData?.estimatedCompletion);
});
 
// ══════════════════════════════════════════════
//  PRODUCTS
// ══════════════════════════════════════════════
function loadProducts() {
  db.collection('products').orderBy('createdAt').onSnapshot(snap => {
    const list = document.getElementById('productList');
    list.innerHTML = '';
    snap.forEach(doc => {
      const p = doc.data();
      const el = document.createElement('div');
      el.className = 'product-item' + (doc.id === currentProductId ? ' active' : '');
      el.dataset.id = doc.id;
      el.innerHTML = `<span class="product-name" title="${esc(p.name)}">${esc(p.name)}</span>
        <button class="del-product" title="刪除">✕</button>`;
      el.querySelector('.product-name').onclick = () => selectProduct(doc.id, p);
      el.querySelector('.del-product').onclick  = e => { e.stopPropagation(); deleteProduct(doc.id); };
      list.appendChild(el);
    });
  });
}
 
function selectProduct(id, data) {
  currentProductId   = id;
  currentProductData = data;
 
  document.querySelectorAll('.product-item').forEach(el =>
    el.classList.toggle('active', el.dataset.id === id));
 
  document.getElementById('productHeader').style.display = 'flex';
  document.getElementById('productNameDisplay').textContent = data.name;
  updateCompletionBadge(data.estimatedCompletion);
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('productContent').style.display = 'block';
 
  if (unsubRows) unsubRows();
  unsubRows = db.collection('products').doc(id).collection('testRows')
    .orderBy('date')
    .onSnapshot(snap => {
      cachedRows = [];
      snap.forEach(d => cachedRows.push({ id: d.id, ...d.data() }));
      renderTable(cachedRows);
      renderGantt(cachedRows, data.estimatedCompletion);
    });
}
 
function updateCompletionBadge(dateStr) {
  const badge = document.getElementById('completionBadge');
  if (!dateStr) { badge.textContent = '預計完成：未設定'; badge.className = 'completion-badge'; return; }
  const today = new Date().toISOString().split('T')[0];
  badge.textContent = `預計完成：${dateStr}`;
  badge.className = 'completion-badge' + (dateStr < today ? ' overdue' : '');
}
 
function openAddProductModal() {
  editingProductId = null;
  document.getElementById('productModalTitle').textContent = '新增產品';
  document.getElementById('productNameInput').value = '';
  document.getElementById('productDateInput').value = '';
  openModal('productModal');
}
 
function openEditProductModal() {
  if (!currentProductId) return;
  editingProductId = currentProductId;
  document.getElementById('productModalTitle').textContent = '編輯產品';
  document.getElementById('productNameInput').value = currentProductData.name || '';
  document.getElementById('productDateInput').value = currentProductData.estimatedCompletion || '';
  openModal('productModal');
}
 
function saveProduct() {
  const name = document.getElementById('productNameInput').value.trim();
  const date = document.getElementById('productDateInput').value;
  if (!name) { alert('請輸入產品名稱'); return; }
 
  if (editingProductId) {
    db.collection('products').doc(editingProductId).update({ name, estimatedCompletion: date }).then(() => {
      if (currentProductId === editingProductId) {
        currentProductData = { ...currentProductData, name, estimatedCompletion: date };
        document.getElementById('productNameDisplay').textContent = name;
        updateCompletionBadge(date);
      }
      closeModal('productModal');
    });
  } else {
    db.collection('products').add({
      name, estimatedCompletion: date,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(closeModal.bind(null, 'productModal'));
  }
}
 
function deleteProduct(id) {
  if (!confirm('確定刪除此產品及所有測試記錄？')) return;
  db.collection('products').doc(id).collection('testRows').get().then(snap => {
    const batch = db.batch();
    snap.forEach(d => batch.delete(d.ref));
    batch.delete(db.collection('products').doc(id));
    return batch.commit();
  }).then(() => {
    if (currentProductId === id) {
      currentProductId = null; currentProductData = null; cachedRows = [];
      if (unsubRows) { unsubRows(); unsubRows = null; }
      document.getElementById('productHeader').style.display = 'none';
      document.getElementById('placeholder').style.display  = 'flex';
      document.getElementById('productContent').style.display = 'none';
    }
  });
}
 
// ══════════════════════════════════════════════
//  TABLE
// ══════════════════════════════════════════════
function renderTable(rows) {
  const tbody = document.getElementById('rowTableBody');
  tbody.innerHTML = '';
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:#94a3b8;padding:28px">尚無測試記錄，點擊「新增測試」開始</td></tr>`;
    return;
  }
  rows.forEach(row => {
    const score = calcScore(row.ratings);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="white-space:nowrap">${row.date || '—'}</td>
      <td><code>${esc(row.version || '—')}</code></td>
      <td class="truncate" title="${esc(row.description || '')}">${esc(row.description || '—')}</td>
      <td class="truncate" title="${esc(row.solution || '')}">${esc(row.solution || '—')}</td>
      <td>${scoreBadge(score)}</td>
      <td>${row.fileUrl
        ? `<a href="${row.fileUrl}" target="_blank" style="color:#2563eb;font-size:12px;white-space:nowrap">🔗 Drive</a>`
        : '<span style="color:#cbd5e1">—</span>'}</td>
      <td style="white-space:nowrap">
        <button class="action-btn" onclick="viewRow('${row.id}')">詳細</button>
        <button class="action-btn" onclick="openEditRowModal('${row.id}')">編輯</button>
        <button class="action-btn danger" onclick="deleteRow('${row.id}')">刪除</button>
      </td>`;
    tbody.appendChild(tr);
  });
}
 
function calcScore(ratings) {
  if (!ratings) return null;
  const vals = Object.values(ratings).filter(v => v);
  if (!vals.length) return null;
  const map = { pass: 3, partial: 2, fail: 1 };
  return Math.round(vals.reduce((s, v) => s + (map[v]||0), 0) / (vals.length * 3) * 100);
}
 
function scoreBadge(score) {
  if (score === null) return '<span class="score-badge score-na">未評分</span>';
  const cls = score >= 80 ? 'score-high' : score >= 50 ? 'score-mid' : 'score-low';
  return `<span class="score-badge ${cls}">${score}%</span>`;
}
 
// ══════════════════════════════════════════════
//  ROW MODAL — BUILD RATING UI
// ══════════════════════════════════════════════
function buildRatingUI() {
  const container = document.getElementById('ratingRows');
  let lastGroup = null;
  CATS.forEach(cat => {
    if (cat.group && cat.group !== lastGroup) {
      const hdr = document.createElement('div');
      hdr.className = 'rating-row group-label';
      hdr.textContent = `📋 ${cat.groupLabel}`;
      container.appendChild(hdr);
      lastGroup = cat.group;
    } else if (!cat.group) {
      lastGroup = null;
    }
    const row = document.createElement('div');
    row.className = 'rating-row' + (cat.group ? ' is-sub' : '');
    row.innerHTML = `
      <span class="rating-label">${cat.group ? '↳ ' : ''}${cat.label}</span>
      <div class="rating-btns">
        <button class="rating-btn pass"    data-key="${cat.key}" data-val="pass"    title="通過">✓</button>
        <button class="rating-btn partial" data-key="${cat.key}" data-val="partial" title="部分通過">△</button>
        <button class="rating-btn fail"    data-key="${cat.key}" data-val="fail"    title="未通過">✗</button>
      </div>`;
    container.appendChild(row);
  });
  container.addEventListener('click', e => {
    const btn = e.target.closest('.rating-btn');
    if (!btn) return;
    const key = btn.dataset.key, val = btn.dataset.val;
    if (currentRatings[key] === val) {
      currentRatings[key] = null;
      btn.closest('.rating-btns').querySelectorAll('.rating-btn').forEach(b => b.classList.remove('active'));
    } else {
      currentRatings[key] = val;
      btn.closest('.rating-btns').querySelectorAll('.rating-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.val === val));
    }
  });
}
 
function resetRatingUI(ratings = {}) {
  currentRatings = { ...ratings };
  document.querySelectorAll('#ratingRows .rating-btn').forEach(b => {
    b.classList.toggle('active', currentRatings[b.dataset.key] === b.dataset.val);
  });
}
 
// ══════════════════════════════════════════════
//  ROW MODAL — OPEN / SAVE / DELETE
// ══════════════════════════════════════════════
function openAddRowModal() {
  if (!currentProductId) return;
  editingRowId = null;
  resetRatingUI();
  document.getElementById('rowModalTitle').textContent = '新增測試記錄';
  document.getElementById('rowDate').value     = new Date().toISOString().split('T')[0];
  document.getElementById('rowVersion').value  = '';
  document.getElementById('rowDesc').value     = '';
  document.getElementById('rowSolution').value = '';
  document.getElementById('driveLink').value   = '';
  openModal('rowModal');
}
 
function openEditRowModal(rowId) {
  db.collection('products').doc(currentProductId).collection('testRows').doc(rowId).get().then(doc => {
    const row = doc.data();
    editingRowId = rowId;
    resetRatingUI(row.ratings || {});
    document.getElementById('rowModalTitle').textContent = '編輯測試記錄';
    document.getElementById('rowDate').value     = row.date        || '';
    document.getElementById('rowVersion').value  = row.version     || '';
    document.getElementById('rowDesc').value     = row.description || '';
    document.getElementById('rowSolution').value = row.solution    || '';
    document.getElementById('driveLink').value   = row.fileUrl     || '';
    openModal('rowModal');
  });
}
 
function saveRow() {
  const date = document.getElementById('rowDate').value;
  if (!date) { alert('請選擇測試日期'); return; }
  document.getElementById('saveRowBtn').disabled = true;

  const data = {
    date,
    version:     document.getElementById('rowVersion').value.trim(),
    description: document.getElementById('rowDesc').value.trim(),
    solution:    document.getElementById('rowSolution').value.trim(),
    ratings:     { ...currentRatings },
    fileUrl:     document.getElementById('driveLink').value.trim() || null,
    updatedAt:   firebase.firestore.FieldValue.serverTimestamp()
  };
  const ref = db.collection('products').doc(currentProductId).collection('testRows');
  const p = editingRowId
    ? ref.doc(editingRowId).update(data)
    : ref.add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
  p.then(() => { document.getElementById('saveRowBtn').disabled = false; closeModal('rowModal'); })
   .catch(err => { document.getElementById('saveRowBtn').disabled = false; alert('儲存失敗: ' + err.message); });
}
 
function deleteRow(rowId) {
  if (!confirm('確定刪除此測試記錄？')) return;
  db.collection('products').doc(currentProductId).collection('testRows').doc(rowId).delete();
}
 
// ══════════════════════════════════════════════
//  VIEW ROW
// ══════════════════════════════════════════════
function viewRow(rowId) {
  const row = cachedRows.find(r => r.id === rowId);
  if (!row) return;
  const score = calcScore(row.ratings);
 
  let ratHtml = '';
  let lastGrp = null;
  CATS.forEach(cat => {
    if (cat.group && cat.group !== lastGrp) {
      ratHtml += `<div class="view-rating-row group-label">📋 ${cat.groupLabel}</div>`;
      lastGrp = cat.group;
    } else if (!cat.group) lastGrp = null;
    const val = row.ratings?.[cat.key] || null;
    const icon = val === 'pass' ? '✓' : val === 'partial' ? '△' : val === 'fail' ? '✗' : '—';
    const cls  = val || 'none';
    ratHtml += `<div class="view-rating-row${cat.group ? ' is-sub' : ''}">
      <span>${cat.group ? '↳ ' : ''}${cat.label}</span>
      <span class="rating-icon ${cls}">${icon}</span>
    </div>`;
  });
 
  document.getElementById('viewContent').innerHTML = `
    <div class="view-grid">
      <div class="view-field"><label>日期</label><p>${row.date||'—'}</p></div>
      <div class="view-field"><label>軟體版本</label><p><code>${esc(row.version||'—')}</code></p></div>
      <div class="view-field full"><label>測試敘述</label><p>${esc(row.description||'—')}</p></div>
      <div class="view-field full"><label>解決方案</label><p>${esc(row.solution||'—')}</p></div>
    </div>
    <hr class="view-divider">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <span style="font-size:14px;font-weight:600;color:#1e293b">測試評分明細</span>
      ${scoreBadge(score)}
    </div>
    ${ratHtml}
    ${row.fileUrl ? `<hr class="view-divider">
      <div class="view-field"><label>Google Drive 連結</label>
        <a href="${row.fileUrl}" target="_blank" style="color:#2563eb;font-size:14px;word-break:break-all">
          🔗 ${row.fileUrl}</a>
      </div>` : ''}
  `;
  openModal('viewModal');
}
 
// ══════════════════════════════════════════════
//  GANTT CHART
// ══════════════════════════════════════════════
function renderGantt(rows, estimatedCompletion) {
  const section = document.getElementById('ganttSection');
  const canvas  = document.getElementById('ganttCanvas');
  if (!rows.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
 
  // Per category: find date range + latest status
  const catMap = {};
  CATS.forEach(c => { catMap[c.key] = { ...c, first: null, last: null, status: null }; });
 
  rows.forEach(row => {
    if (!row.date || !row.ratings) return;
    Object.entries(row.ratings).forEach(([key, val]) => {
      if (!val || !catMap[key]) return;
      if (!catMap[key].first || row.date < catMap[key].first) catMap[key].first = row.date;
      if (!catMap[key].last  || row.date > catMap[key].last)  catMap[key].last  = row.date;
      catMap[key].status = val;  // rows are date-sorted, so last assignment = latest
    });
  });
 
  const active = CATS.filter(c => catMap[c.key].first);
  if (!active.length) { section.style.display = 'none'; return; }
 
  // Date range
  const allDates = rows.map(r => r.date).filter(Boolean);
  if (estimatedCompletion) allDates.push(estimatedCompletion);
  const minD = allDates.reduce((a, b) => a < b ? a : b);
  const maxD = allDates.reduce((a, b) => a > b ? a : b);
  const tStart = new Date(minD); tStart.setDate(tStart.getDate() - 2);
  const tEnd   = new Date(maxD); tEnd.setDate(tEnd.getDate() + 4);
  const totalMs = tEnd - tStart || 1;
 
  // Canvas sizing
  const wrap   = document.getElementById('ganttWrap');
  const W      = Math.max(wrap.offsetWidth - 32, 600);
  const PAD    = { l: 150, r: 60, t: 44, b: 36 };
  const ROW_H  = 38;
  const H      = PAD.t + active.length * ROW_H + PAD.b;
  canvas.width  = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);
 
  const chartW = W - PAD.l - PAD.r;
  const dateX  = d => PAD.l + ((new Date(d) - tStart) / totalMs) * chartW;
 
  // Background
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);
 
  // Alternating row bands + grid lines
  active.forEach((cat, i) => {
    const y = PAD.t + i * ROW_H;
    if (i % 2 === 0) { ctx.fillStyle = '#f8fafc'; ctx.fillRect(PAD.l, y, chartW, ROW_H); }
  });
 
  // Vertical month/week lines
  ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 1;
  const cur = new Date(tStart);
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  while (cur <= tEnd) {
    const x = dateX(cur.toISOString().split('T')[0]);
    ctx.beginPath(); ctx.moveTo(x, PAD.t); ctx.lineTo(x, H - PAD.b); ctx.stroke();
    if (cur.getDate() <= 7) {  // first tick of month
      ctx.fillStyle = '#94a3b8'; ctx.font = '11px Segoe UI'; ctx.textAlign = 'center';
      ctx.fillText(`${MONTHS[cur.getMonth()]} ${cur.getFullYear()}`, x, PAD.t - 26);
    }
    cur.setDate(cur.getDate() + 7);
  }
 
  // Test-date dots (timeline at top)
  rows.forEach(row => {
    if (!row.date) return;
    const sc = calcScore(row.ratings);
    const x  = dateX(row.date);
    ctx.beginPath(); ctx.arc(x, PAD.t - 14, 5, 0, Math.PI * 2);
    ctx.fillStyle = sc === null ? '#94a3b8' : sc >= 80 ? '#16a34a' : sc >= 50 ? '#ca8a04' : '#dc2626';
    ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
  });
 
  // Bars
  const COLORS = {
    pass:    { fill: '#dcfce7', stroke: '#16a34a', icon: '✓' },
    partial: { fill: '#fef9c3', stroke: '#ca8a04', icon: '△' },
    fail:    { fill: '#fee2e2', stroke: '#dc2626', icon: '✗' },
  };
 
  active.forEach((cat, i) => {
    const cd = catMap[cat.key];
    const y  = PAD.t + i * ROW_H;
    const bY = y + ROW_H * 0.2, bH = ROW_H * 0.6;
 
    // Row label
    ctx.fillStyle = '#374151';
    ctx.font = cat.group ? '12px Segoe UI' : '13px Segoe UI';
    ctx.textAlign = 'right';
    ctx.fillText(cat.label, PAD.l - 10, y + ROW_H / 2 + 4);
 
    // Bar
    const x1 = dateX(cd.first);
    const x2 = cd.last ? Math.max(dateX(cd.last) + 6, x1 + 12) : x1 + 12;
    const c  = COLORS[cd.status] || { fill: '#f1f5f9', stroke: '#94a3b8', icon: '—' };
 
    ctx.fillStyle   = c.fill;
    ctx.strokeStyle = c.stroke;
    ctx.lineWidth   = 2;
    rrect(ctx, x1, bY, x2 - x1, bH, 5);
    ctx.fill(); ctx.stroke();
 
    // Status icon after bar
    ctx.fillStyle   = c.stroke;
    ctx.font        = '14px serif';
    ctx.textAlign   = 'center';
    ctx.fillText(c.icon, x2 + 14, y + ROW_H / 2 + 5);
  });
 
  // Estimated completion line
  if (estimatedCompletion) {
    const x = dateX(estimatedCompletion);
    ctx.save();
    ctx.setLineDash([6, 4]);
    ctx.strokeStyle = '#f97316'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x, PAD.t - 30); ctx.lineTo(x, H - PAD.b); ctx.stroke();
    ctx.restore();
    ctx.fillStyle = '#f97316'; ctx.font = 'bold 11px Segoe UI'; ctx.textAlign = 'center';
    ctx.fillText('預計完成', x, H - PAD.b + 15);
  }
 
  // Top legend
  ctx.textAlign = 'left'; ctx.font = '12px Segoe UI';
  let lx = PAD.l;
  ctx.fillStyle = '#64748b'; ctx.fillText('測試：', lx, PAD.t - 24); lx += 44;
  [['#16a34a','≥80%'],['#ca8a04','50‑79%'],['#dc2626','<50%']].forEach(([col, lbl]) => {
    ctx.beginPath(); ctx.arc(lx + 5, PAD.t - 28, 4, 0, Math.PI*2);
    ctx.fillStyle = col; ctx.fill();
    ctx.fillStyle = '#374151'; ctx.fillText(lbl, lx + 13, PAD.t - 24);
    lx += 64;
  });
}
 
function rrect(ctx, x, y, w, h, r) {
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}
 
// ══════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════
function openModal(id)  { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
